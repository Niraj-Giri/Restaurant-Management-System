spring.application.name=restaurant
server.port=9090

# Database Connection
spring.datasource.url=jdbc:mysql://localhost:3306/resturant
spring.datasource.username=root
spring.datasource.password=@#New7890

# Modern Dialect for Spring Boot 4/Hibernate 6+
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL5InnoDBDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.hibernate.transaction.jta.platform=true

#logging.level.org.springframework.web.servlet.mvc.method.annotation.RequestMappingHandlerMapping=TRACE

# Debugging
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# keep this, so that scheme.sql runs before data.sql
spring.jpa.defer-datasource-initialization=true
